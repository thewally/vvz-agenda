name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - run: npx vitest run --reporter=verbose
        name: Run tests

      - run: npm run build
        name: Build IIFE bundle

      - name: Prepare Pages artifact
        run: |
          # Use the pre-built production HTML (correct script tags, no module import)
          cp index.prod.html dist/index.html
          # Copy activity Markdown files and manifest (not included automatically in lib builds)
          cp -r public/activities dist/activities

      - uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4.0.5
        id: deployment
