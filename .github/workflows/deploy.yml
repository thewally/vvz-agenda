name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - run: npx vitest run --reporter=verbose
        name: Run tests

      - run: npm run build
        name: Build IIFE bundle

      - name: Prepare Pages artifact
        run: |
          cp index.html dist/index.html
          # Rewrite the module import to use the built IIFE bundle
          sed -i 's|<script type="module">.*import "./src/main.ts";|<script src="vvz-agenda.js"></script>\n    <script>|' dist/index.html
          # Fix the manifestUrl to use the correct base path
          sed -i 's|manifestUrl: "/activities/manifest.json"|manifestUrl: "/vvz-agenda/activities/manifest.json"|' dist/index.html
          # Copy activity Markdown files and manifest (not included automatically in lib builds)
          cp -r public/activities dist/activities

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
